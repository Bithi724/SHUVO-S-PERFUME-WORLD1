{% extends "base.html" %}
{% block title %}Add Perfume | Perfume World{% endblock %}

{% block content %}
<section class="admin-page">
    <div class="container">
        <div class="admin-head">
            <h1>Add New Perfume</h1>
            <a href="{{ url_for('home') }}" class="btn btn-secondary">← Back to Catalog</a>
        </div>

        {% if error_msg %}
            <div class="form-alert">{{ error_msg }}</div>
        {% endif %}

        <div class="admin-form-card">
            <form method="POST" action="{{ url_for('admin_add_perfume') }}" class="admin-form-grid">

                <div class="field field-full">
                    <label for="name">Perfume Name *</label>
                    <input type="text" id="name" name="name" class="search-input"
                           value="{{ request.form.get('name', '') }}" required>
                </div>

                <div class="field">
                    <label for="brand_id">Select Existing Brand</label>
                    <select id="brand_id" name="brand_id">
                        <option value="">-- Select Brand --</option>
                        {% for b in brands %}
                            <option value="{{ b.id }}"
                                {% if request.form.get('brand_id') == (b.id|string) %}selected{% endif %}>
                                {{ b.name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="field">
                    <label for="new_brand_name">Or New Brand Name</label>
                    <input type="text" id="new_brand_name" name="new_brand_name" class="search-input"
                           placeholder="Type a new brand (optional)"
                           value="{{ request.form.get('new_brand_name', '') }}">
                </div>

                <div class="field">
                    <label for="price">Price *</label>
                    <input type="number" step="0.01" id="price" name="price" class="search-input"
                           value="{{ request.form.get('price', '') }}" required>
                </div>

                <div class="field">
                    <label for="stock_qty">Stock Quantity *</label>
                    <input type="number" id="stock_qty" name="stock_qty" class="search-input"
                           value="{{ request.form.get('stock_qty', '0') }}" required>
                </div>

                <div class="field">
                    <label for="gender_target">Gender</label>
                    <select id="gender_target" name="gender_target">
                        {% set g = request.form.get('gender_target', 'Unisex') %}
                        <option value="Male" {% if g == "Male" %}selected{% endif %}>Male</option>
                        <option value="Female" {% if g == "Female" %}selected{% endif %}>Female</option>
                        <option value="Unisex" {% if g == "Unisex" %}selected{% endif %}>Unisex</option>
                    </select>
                </div>

                <div class="field">
                    <label for="category">Category</label>
                    <input type="text" id="category" name="category" class="search-input"
                           placeholder="Fresh / Floral / Woody / Amber..."
                           value="{{ request.form.get('category', 'General') }}">
                </div>

                <div class="field field-full">
                    <label for="image_url">Image URL</label>
                    <input type="url" id="image_url" name="image_url" class="search-input"
                           placeholder="https://example.com/image.jpg"
                           value="{{ request.form.get('image_url', '') }}">
                </div>

                <div class="field">
                    <label for="top_notes">Top Notes</label>
                    <input type="text" id="top_notes" name="top_notes" class="search-input"
                           value="{{ request.form.get('top_notes', '') }}">
                </div>

                <div class="field">
                    <label for="middle_notes">Middle Notes</label>
                    <input type="text" id="middle_notes" name="middle_notes" class="search-input"
                           value="{{ request.form.get('middle_notes', '') }}">
                </div>

                <div class="field">
                    <label for="base_notes">Base Notes</label>
                    <input type="text" id="base_notes" name="base_notes" class="search-input"
                           value="{{ request.form.get('base_notes', '') }}">
                </div>

                <div class="field field-full">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" rows="5" class="admin-textarea"
                              placeholder="Short perfume description...">{{ request.form.get('description', '') }}</textarea>
                </div>

                <div class="field field-full inline-check">
                    <label class="check-wrap">
                        <input type="checkbox" name="is_active" {% if request.method != "POST" or request.form.get('is_active') %}checked{% endif %}>
                        <span>Active (show in catalog)</span>
                    </label>
                </div>

                <div class="field field-full form-actions">
                    <button type="submit" class="btn btn-primary">Save Perfume</button>
                    <a href="{{ url_for('home') }}" class="btn btn-secondary">Cancel</a>
                </div>

            </form>
        </div>
    </div>
</section>
{% endblock %}
