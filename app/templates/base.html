<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfume World</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Perfume World</div>
        <div class="nav-links">
            <a href="{{ url_for('main.home') }}">Home</a>
            <a href="{{ url_for('main.catalog') }}">Catalog</a>
            <a href="{{ url_for('main.catalog') }}?gender=Men">Men</a>
            <a href="{{ url_for('main.catalog') }}?gender=Women">Women</a>
            <a href="{{ url_for('main.catalog') }}?gender=Unisex">Unisex</a>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
